<script type="text/babel">
// ─── onboarding.jsx (inlined) ───
// Onboarding — 5 pages: Welcome, Location, Sensitivity, Remind you (alerts), Widget.

const ALERT_BLURBS = {
  umbrella:   "When the sky gets ideas before you do.",
  sunglasses: "For the days the light bites back.",
  jacket:     "Soft armor for in-between weather.",
  coat:       "When morning calls for layers.",
  sunscreen:  "Quiet protection on bright afternoons.",
  water:      "A nudge when the heat asks for it.",
  wind:       "If the breeze tries to be a story.",
  boots:      "For when puddles join the commute.",
  mask:       "On heavy-pollen, low-air mornings.",
  hat:        "For the cold that nips at the ears.",
};

const ONB_PAGES_DATA = [
  {
    id: 0, state: "sunny", icon: "sunny",
    title: "UmbrellaToday",
    sub: "Your umbrella answer in one glance.",
    desc: "Temperature first, then a clear yes-or-no on the umbrella — without opening a full weather app.",
    cta: "Get Started",
  },
  {
    id: 1, state: "rainy", icon: "rainy",
    title: "Use your location",
    sub: "We check the forecast around you so the recommendation stays local and accurate.",
    desc: null,
    cta: "Enable Location",
    perms: [
      { title: "Location, while in use", sub: "Used only for forecast lookups. Never shared." },
      { title: "Notifications (optional)",  sub: "A morning reminder before you head out." },
    ],
  },
  {
    id: 2, state: "rainy", icon: "rainy",
    title: "Tune your sensitivity",
    sub: "Pick how cautious UmbrellaToday should be when calling for an umbrella.",
    desc: null,
    cta: "Continue",
  },
  {
    id: 3, state: "sunny", icon: "sunny",
    title: "Things to remind you",
    sub: "Tap what UmbrellaToday should mention before you head out. Choose none, choose all — or let chance choose for you.",
    desc: null,
    cta: "Continue",
  },
  {
    id: 4, state: "sunny", icon: "sunny",
    title: "Add the widget",
    sub: "Keep UmbrellaToday on your home or lock screen for the fastest daily check.",
    cta: "Open UmbrellaToday",
    steps: [
      "Long press your home screen",
      "Tap the + button",
      "Search for UmbrellaToday",
      "Choose small or medium",
    ],
  },
];

function Onboarding({ onFinish, onApplyAlerts }) {
  const [page, setPage] = React.useState(0);
  const [locEnabled, setLocEnabled] = React.useState(false);
  const [sens, setSens] = React.useState("medium");
  const [picked, setPicked] = React.useState(() => new Set());
  const [shakeKey, setShakeKey] = React.useState(0);
  const cur = ONB_PAGES_DATA[page];

  const togglePick = (id) => {
    setPicked(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  const randomize = () => {
    const all = window.PERSONAL_ALERTS_DEFAULT || [];
    // pick 3-5 random ids
    const n = 3 + Math.floor(Math.random() * 3);
    const shuffled = [...all].sort(() => Math.random() - 0.5).slice(0, n);
    setPicked(new Set(shuffled.map(a => a.id)));
    setShakeKey(k => k + 1);
  };

  const advance = () => {
    if (page === 1 && !locEnabled) {
      setLocEnabled(true);
      return;
    }
    if (page < ONB_PAGES_DATA.length - 1) {
      setPage(page + 1);
    } else {
      // finishing — push the picked alerts up to context
      if (onApplyAlerts) {
        const def = window.PERSONAL_ALERTS_DEFAULT || [];
        onApplyAlerts(def.map(a => ({ ...a, on: picked.has(a.id) })));
      }
      onFinish && onFinish();
    }
  };

  const cta = page === 1 ? (locEnabled ? "Continue" : "Enable Location") : cur.cta;
  const progress = ((page + 1) / ONB_PAGES_DATA.length) * 100;

  return (
    <div className="app-stage" data-state={cur.state} style={{ paddingTop: 0 }}>
      <div className="onb-shell" style={{ paddingTop: 60 }}>
        <div style={{ padding: "0 20px 8px", display: "flex", flexDirection: "column", gap: 10 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 11, fontWeight: 600, color: "var(--accent)", fontFamily: "ui-monospace, SF Mono, Menlo, monospace" }}>
              {String(page + 1).padStart(2, "0")} / {String(ONB_PAGES_DATA.length).padStart(2, "0")}
            </span>
            {page < ONB_PAGES_DATA.length - 1 && (
              <button className="onb-skip" onClick={() => setPage(ONB_PAGES_DATA.length - 1)}>Skip</button>
            )}
          </div>
          <div className="onb-progress"><div style={{ width: `${progress}%` }}></div></div>
        </div>

        <div className="onb-pages">
          {ONB_PAGES_DATA.map((p, i) => (
            <div key={p.id} className={`onb-page ${i === page ? "" : "hidden"}`}>
              <div className="surface-card">
                {p.id === 0 && (
                  <div className="onb-card">
                    <WeatherIcon state="sunny" size={104} />
                    <div>
                      <div className="onb-title">{p.title}</div>
                      <div className="onb-sub">{p.sub}</div>
                      <div className="onb-desc">{p.desc}</div>
                    </div>
                  </div>
                )}

                {p.id === 1 && (
                  <div className="onb-card left">
                    <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                      <WeatherIcon state="rainy" size={72} />
                      <div>
                        <div className="onb-title sm">{p.title}</div>
                        <div className="onb-sub" style={{ fontSize: 13, marginTop: 6 }}>{p.sub}</div>
                      </div>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 10, marginTop: 4 }}>
                      {p.perms.map((perm, idx) => (
                        <div className="onb-perm-row" key={idx}>
                          <span className="badge">
                            {idx === 0 ? <Icon.Pin size={16} color="currentColor" /> : <Icon.Plane size={15} color="currentColor" />}
                          </span>
                          <div>
                            <div className="onb-perm-title">{perm.title}</div>
                            <div className="onb-perm-sub">{perm.sub}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                    <div className="loc-status" style={{ alignSelf: "flex-start" }}>
                      <span className="led" style={{ background: locEnabled ? "#34C759" : "#9CA3AF" }}></span>
                      <span>{locEnabled ? "Location enabled" : "Awaiting permission"}</span>
                    </div>
                  </div>
                )}

                {p.id === 2 && (
                  <div className="onb-card left">
                    <div>
                      <div className="onb-title sm">{p.title}</div>
                      <div className="onb-sub" style={{ fontSize: 13, marginTop: 6 }}>{p.sub}</div>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 4 }}>
                      {[
                        { id: "low", name: "Low", desc: "Only flag rain ≥60% likelihood." },
                        { id: "medium", name: "Medium", desc: "Balanced — flag rain ≥40%." },
                        { id: "high", name: "High", desc: "Cautious — flag any chance ≥20%." },
                      ].map((s) => (
                        <div key={s.id}
                          className={`choice-row ${sens === s.id ? "selected" : ""}`}
                          onClick={() => setSens(s.id)}>
                          <span className={`choice-indicator ${sens === s.id ? "on" : ""}`}></span>
                          <div className="choice-text">
                            <div className="name">{s.name}</div>
                            <div className="desc">{s.desc}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {p.id === 3 && (
                  <div className="onb-card left bohem">
                    <div className="onb-bohem-head">
                      <div className="onb-eyebrow">A few things you carry</div>
                      <div className="onb-display">{p.title}</div>
                      <div className="onb-lede">{p.sub}</div>
                    </div>
                    <button className="onb-shake" onClick={randomize} type="button">
                      <span className="dice">⟳</span>
                      <span>Shake the dice</span>
                      <span className="hint">A handful, randomly</span>
                    </button>
                    <div className={`onb-tile-list shake-${shakeKey}`}>
                      {(window.PERSONAL_ALERTS_DEFAULT || []).map((a, idx) => {
                        const on = picked.has(a.id);
                        return (
                          <button
                            key={a.id}
                            className={`onb-tile ${on ? "on" : ""}`}
                            onClick={() => togglePick(a.id)}
                            type="button"
                            style={{ "--i": idx }}
                          >
                            <span className="onb-tile-ico"><AGlyph kind={a.glyph} size={22} /></span>
                            <span className="onb-tile-text">
                              <span className="name">{a.name}</span>
                              <span className="desc">{ALERT_BLURBS[a.id] || ""}</span>
                            </span>
                            <span className={`onb-tile-switch ${on ? "on" : ""}`} aria-hidden="true">
                              <span className="knob"></span>
                            </span>
                          </button>
                        );
                      })}
                    </div>
                    <div className="onb-tile-foot">
                      {picked.size === 0
                        ? <span>Pick what fits your day · or shake the dice.</span>
                        : <span><strong>{picked.size}</strong> on your list · fine-tune later in Settings.</span>}
                    </div>
                  </div>
                )}

                {p.id === 4 && (
                  <div className="onb-card left">
                    <div className="onb-widget-preview">
                      <div className="pad">
                        <div style={{ position: "relative", zIndex: 1, transform: "scale(0.78)", transformOrigin: "center" }}>
                          <SmallWidget scenario="rainy" location="İstanbul" rainPct={78} />
                        </div>
                      </div>
                      <div className="label">A small umbrella, every morning.</div>
                    </div>
                    <div>
                      <div className="onb-title sm">{p.title}</div>
                      <div className="onb-sub" style={{ marginTop: 6, fontSize: 13 }}>{p.sub}</div>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 12, marginTop: 4 }}>
                      {p.steps.map((s, idx) => (
                        <div className="onb-step" key={idx}>
                          <span className="num">{idx + 1}</span>
                          <span className="txt">{s}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>

        <div className="onb-dots">
          {ONB_PAGES_DATA.map((p, i) => (
            <span key={p.id} className={`dot ${i === page ? "on" : ""}`}></span>
          ))}
        </div>
        <div style={{ display: "flex", gap: 10, padding: "0 20px 16px" }}>
          {page > 0 && (
            <button onClick={() => setPage(page - 1)} style={{
              flex: "0 0 auto", padding: "16px 18px", borderRadius: 24,
              background: "transparent", border: "0.5px solid var(--border)",
              color: "var(--accent)", fontSize: 16, fontWeight: 600, cursor: "pointer",
              fontFamily: "inherit",
            }}>Back</button>
          )}
          <div className="onb-cta" style={{ flex: 1, margin: 0 }} onClick={advance}>{cta}</div>
        </div>
      </div>
    </div>
  );
}

window.Onboarding = Onboarding;

</script>
<script type="text/babel" src="widgets.jsx"></script>
<script type="text/babel">
// ─── phone-app.jsx (inlined) ───
// Phone wrapper — uses ios-frame.jsx; switches between dashboard / settings.

function PhoneApp({ initialScreen = "dashboard", scenario = "rainy", drawerOpen: drawerOpenProp = false, tweaks }) {
  const [screen, setScreen]       = React.useState(initialScreen);
  const [scen, setScen]           = React.useState(scenario);
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  const [drawerOpen, setDrawerOpen]     = React.useState(drawerOpenProp);
  const [activeCityId, setActiveCityId] = React.useState("ist");
  const [alerts, setAlerts]       = React.useState(window.PERSONAL_ALERTS_DEFAULT || []);
  const [theme]                   = React.useState("light");

  const mood           = tweaks?.mood || "bohem";
  const atmos          = tweaks?.atmos ?? 50;
  const atmosBucketName = window.atmosBucket
    ? window.atmosBucket(atmos)
    : (atmos < 25 ? "flat" : atmos < 75 ? "mid" : "wash");

  const prefersDark = typeof window !== "undefined" && window.matchMedia
    ? window.matchMedia("(prefers-color-scheme: dark)").matches
    : false;
  const isDark = theme === "dark" || (theme === "auto" && prefersDark);

  function handleSelectCity(city) {
    setActiveCityId(city.id);
    setScen(city.state);   // ← ana ekranı değiştir
    setDrawerOpen(false);
  }

  // ctx kept for Settings compatibility
  const ctx    = { cities: window.SAVED_CITIES || [], activeCityId, alerts, theme };
  const setCtx = () => {};

  return (
    <IOSDevice width={390} height={844} dark={isDark}>
      {screen === "onboarding" ? (
        <Onboarding
          onFinish={() => setScreen("dashboard")}
          onApplyAlerts={(a) => setAlerts(a)}
        />
      ) : (
        <div
          style={{ position:"relative", width:"100%", height:"100%", overflow:"hidden" }}
          data-mood={mood}
          data-atmos-bucket={atmosBucketName}
          data-theme={isDark ? "dark" : "light"}
          className="ut-root"
        >
          {atmosBucketName === "wash" && <WatercolorWash scenario={scen} />}

          <Dashboard
            scenario={scen}
            mock={false}
            alerts={alerts}
            tweaks={tweaks}
            onOpenSettings={() => setSettingsOpen(true)}
            onOpenDrawer={() => setDrawerOpen(true)}
          />

          <LeftDrawer
            open={drawerOpen}
            onClose={() => setDrawerOpen(false)}
            activeCityId={activeCityId}
            onSelectCity={handleSelectCity}
          />

          <div className={`sheet-backdrop ${settingsOpen ? "on" : ""}`} onClick={() => setSettingsOpen(false)}></div>
          <div className={`sheet ${settingsOpen ? "on" : ""}`}>
            <div className="sheet-grabber"></div>
            <div className="sheet-body">
              <Settings
                visualState={scen}
                onClose={() => setSettingsOpen(false)}
                ctx={ctx}
                setCtx={setCtx}
                onOpenDrawer={() => { setSettingsOpen(false); setDrawerOpen(true); }}
                tweaks={tweaks}
              />
            </div>
          </div>
        </div>
      )}
    </IOSDevice>
  );
}

// Watercolor wash decoration
function WatercolorWash({ scenario }) {
  return (
    <div className="ut-wash" data-state={scenario} aria-hidden="true">
      <span className="ut-wash-blob b1"></span>
      <span className="ut-wash-blob b2"></span>
      <span className="ut-wash-blob b3"></span>
      <span className="ut-wash-grain"></span>
    </div>
  );
}

window.PhoneApp = PhoneApp;

</script>
<script type="text/babel">
// ─── alternative.jsx (inlined) ───
// Alternative dashboard v3 — Apple-card map + 8-item monochrome advice grid.
//
// ─── ARCHITECTURE OVERVIEW (for coding agents) ──────────────────────────
//
//  AlternativeDashboard  (line ~1055)
//    props:
//      scenario       — key into window.SCENARIOS (from dashboard.jsx)
//                       e.g. "sc_coat", "rainy", "sc_umbrella"
//      detailMode     — "popup" | "sheet"  (how day-detail is shown)
//      presetDayIndex — number | null — force a specific day open on mount
//                       (0 = Today, 1 = Tue, … — useful for design artboards)
//      forceHeroItem  — overrides which item glyph lights up in the 2×4 grid
//                       e.g. "coat" ignores weather and always highlights coat
//
//  Data flow:
//    SCENARIOS dict → { state, temp, rainPct, verdict, reason, hourly, … }
//    buildAdvice()  → array of { glyph, title, sub } advice cards
//    NEXT_DAYS      → 6-day forecast rows (tappable → opens DayPopup/DaySheet)
//
//  Sub-components (top → bottom in rendered page):
//    ItemScene       — full-width SVG hero illustration keyed to forceHeroItem
//    HeroRow         — big temp + 2×4 item glyph grid (glow = active alert)
//    AdviceStrip     — horizontal scrollable advice pills
//    NextDaysList    — 6 tappable day rows, each showing state / high / low / rain
//    DayPopup        — centered modal card (detailMode="popup")
//    DaySheet        — full-height bottom sheet (detailMode="sheet")
//
//  DayPopup (line ~888) renders when selectedDay !== null && detailMode==="popup":
//    · glass backdrop with blur
//    · day name + weather state header

// Decide which item drives the hero scene given the day's fired set.
const HERO_PRIORITY = ["umbrella", "boots", "coat", "jacket", "sunscreen", "sunglasses", "water", "hat"];
function pickHeroItem(fired, fallbackState) {
  for (const id of HERO_PRIORITY) if (fired.has(id)) return id;
  if (fallbackState === "rainy") return "umbrella";
  if (fallbackState === "sunny") return "sunglasses";
  return "jacket";
}

// Atmospheric particles per scene type.
function SceneParticles({ kind, accent }) {
  if (kind === "rain") {
    const drops = [];
    for (let i = 0; i < 38; i++) {
      const x = (i * 23 + i % 3 * 7) % 390;
      const y = i * 17 % 180 + 10;
      drops.push(<line key={i} x1={x} y1={y} x2={x - 4} y2={y + 12}
      stroke="rgba(190,220,255,0.55)" strokeWidth="1.1" strokeLinecap="round" />);
    }
    return <g>{drops}</g>;
  }
  if (kind === "rays") {
    const rays = [];
    const cx = 320,cy = 80;
    for (let i = 0; i < 9; i++) {
      const ang = -Math.PI / 2 + (i - 4) * 0.18;
      const x2 = cx + Math.cos(ang) * 240;
      const y2 = cy + Math.sin(ang) * 240;
      rays.push(<line key={i} x1={cx} y1={cy} x2={x2} y2={y2}
      stroke={accent} strokeOpacity="0.18" strokeWidth="1.4" strokeLinecap="round" />);
    }
    return (
      <g>
        <circle cx={cx} cy={cy} r="46" fill={accent} fillOpacity="0.92" />
        <circle cx={cx} cy={cy} r="58" fill={accent} fillOpacity="0.22" />
        {rays}
      </g>);

  }
  if (kind === "snow") {
    const flakes = [];
    for (let i = 0; i < 32; i++) {
      const x = (i * 29 + i % 5 * 11) % 390;
      const y = i * 19 % 190 + 6;
      const r = 1.4 + i % 3 * 0.6;
      flakes.push(<circle key={i} cx={x} cy={y} r={r}
      fill="rgba(220,235,255,0.78)" />);
    }
    return <g>{flakes}</g>;
  }
  if (kind === "leaves") {
    const leaves = [];
    for (let i = 0; i < 14; i++) {
      const x = (i * 33 + i % 4 * 9) % 390;
      const y = i * 23 % 170 + 12;
      const r = i * 47 % 360;
      leaves.push(
        <path key={i} d="M 0 -4 q 4 2 4 6 q -4 0 -4 -6 z"
        fill="rgba(220,180,90,0.55)"
        transform={`translate(${x},${y}) rotate(${r})`} />
      );
    }
    return <g>{leaves}</g>;
  }
  if (kind === "wind") {
    const lines = [];
    for (let i = 0; i < 8; i++) {
      const y = 30 + i * 22 + i % 2 * 5;
      const x = 30 + i % 3 * 8;
      const w = 80 + i % 3 * 40;
      lines.push(<path key={i}
      d={`M ${x} ${y} q ${w / 2} -6 ${w} 0`}
      stroke="rgba(220,228,240,0.40)" strokeWidth="1.2"
      fill="none" strokeLinecap="round" />);
    }
    return <g>{lines}</g>;
  }
  if (kind === "puddle") {
    // ripples in the lower band
    const rings = [];
    [[100, 210], [260, 200], [180, 228]].forEach(([cx, cy], i) => {
      rings.push(
        <ellipse key={i + "a"} cx={cx} cy={cy} rx="38" ry="6" fill="none"
        stroke={accent} strokeOpacity="0.55" strokeWidth="1.2" />,
        <ellipse key={i + "b"} cx={cx} cy={cy} rx="22" ry="4" fill="none"
        stroke={accent} strokeOpacity="0.4" strokeWidth="1" />
      );
    });
    const drops = [];
    for (let i = 0; i < 18; i++) {
      const x = i * 27 % 390;
      const y = i * 13 % 130 + 16;
      drops.push(<line key={i} x1={x} y1={y} x2={x - 3} y2={y + 9}
      stroke="rgba(190,220,255,0.5)" strokeWidth="1" strokeLinecap="round" />);
    }
    return <g>{drops}{rings}</g>;
  }
  if (kind === "heat") {
    const waves = [];
    for (let i = 0; i < 5; i++) {
      const y = 40 + i * 28;
      const off = i % 2 ? 16 : 0;
      waves.push(
        <path key={i}
        d={`M ${-20 + off} ${y} q 40 -10 80 0 t 80 0 t 80 0 t 80 0 t 80 0`}
        stroke={accent} strokeOpacity={0.18 + i * 0.04} strokeWidth="1.2"
        fill="none" strokeLinecap="round" />
      );
    }
    return <g>{waves}</g>;
  }
  return null;
}

const ALT_ITEMS = [

{ id: "sunglasses", label: "Shades" },
{ id: "sunscreen", label: "SPF" },
{ id: "jacket", label: "Jacket" },
{ id: "coat", label: "Coat" },
{ id: "boots", label: "Boots" },
{ id: "hat", label: "Hat" },
{ id: "water", label: "Water" }];


function fireForState(data) {
  const fired = new Set();
  if (!data || !data.hourly || !data.hourly.length) return fired;
  const max = (k) => Math.max(...data.hourly.map((h) => h[k] ?? 0));
  if (max("p") >= 40) fired.add("umbrella");
  if (max("p") >= 70) fired.add("boots");
  if (max("uv") >= 4) fired.add("sunglasses");
  if (max("uv") >= 6) fired.add("sunscreen");
  if ((data.feels ?? 99) <= 16) fired.add("jacket");
  if ((data.feels ?? 99) <= 6) fired.add("coat");
  if ((data.feels ?? 99) <= 6) fired.add("hat");
  if (max("t") >= 26) fired.add("water");
  return fired;
}

function pickDetGlyph(h) {
  const hh = parseInt(h.h, 10);
  const night = hh >= 20 || hh < 6;
  if ((h.p ?? 0) >= 50) return "rain";
  if ((h.p ?? 0) >= 20) return night ? "moon-cloud" : "cloud";
  if (night) return "moon-cloud";
  return (h.uv ?? 0) >= 4 ? "sun" : "cloud";
}

// Each row is a one-liner (day, date, glyph, high/low). Tapping a row opens

function nextDayGlyph(d) {
  if (d.state === "rainy") return "rain";
  if (d.state === "sunny") return "sun";
  return "cloud";
}

// Generate a date label N days from today (e.g. "19 May").
const _MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
function dateLabelOffset(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.getDate() + " " + _MONTHS[d.getMonth()];
}

  const d = new Date();
  d.setDate(d.getDate() + offset);

}

// ═══ Day POPUP — flip-card modal (front: summary, back: detail) ══════════
// Two faces on a single card. Swipe or tap flips it with a 3D rotateY.
// Front = overview (temp, stats, rain bars, items).
// Back  = hourly detail (temp + rain combined chart, wind, UV bar).
function DayPopup({ day, onClose }) {
  if (!day) return null;
  const [flipped, setFlipped] = React.useState(false);
  const [showHint, setShowHint] = React.useState(false);
  const touchRef = React.useRef({ x: 0 });

  React.useEffect(() => {
    if (flipped) return;
    const t = setTimeout(() => setShowHint(true), 2200);
    return () => clearTimeout(t);
  }, [flipped]);

  const onTS = (e) => { touchRef.current.x = e.touches?.[0]?.clientX ?? e.clientX; };
  const onTE = (e) => {
    const dx = (e.changedTouches?.[0]?.clientX ?? e.clientX) - touchRef.current.x;
    if (Math.abs(dx) > 40) { setFlipped(f => !f); setShowHint(false); }
  };

  const fired = (() => {
    const f = new Set();
    if (day.p >= 40) f.add("umbrella");
    if (day.p >= 70) f.add("boots");
    if ((day.uv ?? 0) >= 4) f.add("sunglasses");
    if ((day.uv ?? 0) >= 6) f.add("sunscreen");
    if ((day.low ?? 99) <= 12) f.add("jacket");
    if ((day.low ?? 99) <= 6) {f.add("coat");f.add("hat");}
    if ((day.high ?? 0) >= 26) f.add("water");
    return f;
  })();
  const peakIdx = day.hourly && day.hourly.length ?
  day.hourly.reduce((acc, p, i, arr) => p > arr[acc] ? i : acc, 0) : 0;
  const peakLabel = [`00`, `03`, `06`, `09`, `12`, `15`, `18`, `21`][peakIdx] || "—";

  const hours = day.hourly || [];
  const hourLabels = ["00","03","06","09","12","15","18","21"];
  const tempCurve = hours.length ? hours : [8,10,14,16,15,12,10,8];
  const windCurve = hours.length ? hours.map((_p,i) => Math.max(4, (day.wind||12) - 6 + (Math.sin(i*0.9)*8|0))) : [8,10,14,18,16,12,10,8];
  const uvCurve = [0,1,3, (day.uv||3), Math.max(0,(day.uv||3)-1), 2, 0, 0];

  const sparkline = (vals, w, h, color, fillColor) => {
    const mx = Math.max(...vals, 1), mn = Math.min(...vals, 0), rng = mx - mn || 1;
    const pts = vals.map((v,i) => {
      const x = (i/(vals.length-1))*w, y = h - ((v-mn)/rng)*(h-6) - 3;
      return `${x},${y}`;
    });
    const d = `M ${pts.join(" L ")}`;
    return (
      <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{display:"block",width:"100%",height:"auto"}}>
        {fillColor && <path d={d + ` L ${w},${h} L 0,${h} Z`} fill={fillColor}/>}
        <path d={d} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        {vals.map((v,i) => {
          const x = (i/(vals.length-1))*w, y = h - ((v-mn)/rng)*(h-6) - 3;
          return <circle key={i} cx={x} cy={y} r="2.5" fill={color}/>;
        })}
      </svg>);
  };

  // Shared card styles
  const faceBase = {
    position:"absolute",inset:0,
    backfaceVisibility:"hidden",WebkitBackfaceVisibility:"hidden",
    borderRadius:24,
    background:"rgba(20,22,28,0.96)",
    border:"0.5px solid rgba(255,255,255,0.08)",
    boxShadow:"0 24px 60px rgba(0,0,0,0.6),inset 0 0 0 0.5px rgba(255,255,255,0.04)",
    color:"#f0f3f8",fontFamily:ALT_FF,
    overflowY:"auto",overflowX:"hidden",
  };

  // Header shared between both faces
  const header = (label) => (
    <div style={{
      display:"flex",alignItems:"center",justifyContent:"space-between",
      padding:"14px 16px 10px",
      borderBottom:"0.5px solid rgba(255,255,255,0.06)",
      position:"sticky",top:0,zIndex:2,
      background:"rgba(20,22,28,0.96)",
    }}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <img src="assets/Logo.png" alt="UmbrellaToday" style={{width:28,height:28,borderRadius:8,flexShrink:0}}/>
        <div style={{display:"flex",flexDirection:"column",gap:1}}>
          <div style={{fontSize:14,fontWeight:700,color:"#f0f3f8",letterSpacing:"-0.1px"}}>{DAY_OF_WEEK[(new Date().getDay()+day.offset)%7]}</div>
          <div style={{fontSize:11,fontWeight:600,color:"rgba(220,228,240,0.55)",fontFamily:ALT_FM,letterSpacing:"0.2px"}}>{day.dateLabel}</div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <span style={{fontSize:9,fontWeight:700,fontFamily:ALT_FM,color:"rgba(220,228,240,0.4)",letterSpacing:"0.3px",textTransform:"uppercase"}}>{label}</span>
        <button onClick={onClose} aria-label="Close" style={{
          width:30,height:30,borderRadius:9999,border:"none",cursor:"pointer",
          background:"rgba(28,32,42,0.7)",color:"#f0f3f8",
          display:"flex",alignItems:"center",justifyContent:"center",marginLeft:4,
        }}>
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
    </div>
  );

  return (
    <>
      <div onClick={onClose} style={{
        position:"absolute",inset:0,zIndex:9,
        background:"rgba(8,10,14,0.55)",
        backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",

      }}></div>

      {/* 3D flip container */}
      <div
        onTouchStart={onTS} onTouchEnd={onTE}
        onMouseDown={onTS} onMouseUp={onTE}
        style={{
          position:"absolute",zIndex:10,

          animation:"alt-popup-in 260ms cubic-bezier(.2,.7,.2,1) both",
        }}
      >
        <div style={{
          position:"relative",width:"100%",height:"100%",
          transformStyle:"preserve-3d",
          transition:"transform 550ms cubic-bezier(.4,.0,.2,1)",
          transform: flipped ? "rotateY(180deg)" : "rotateY(0deg)",
        }}>
          {/* ═══ FRONT FACE: Summary ═══ */}
          <div style={{...faceBase}}>

                    {day.hourly.map((p,hi) => (
                      <div key={hi} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>

                <span style={{fontSize:11,fontWeight:600,color:"rgba(220,228,240,0.55)"}}>Flip back to overview</span>

            </div>

        </div>
      </div>
    </>);

}

function TodayRightColumn({ palette, fired }) {
  const now = new Date();
  const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const dayNum = now.getDate();
  const dayName = days[now.getDay()];
  const monthName = months[now.getMonth()];
  const yy = String(now.getFullYear()).slice(-2);
  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "stretch", gap: 14 }}>
      {/* ── Bold typographic TODAY ── */}
      <div style={{ display: "flex", alignItems: "baseline", gap: 8, flexWrap: "wrap" }}>
        <span style={{
          fontSize: 26, fontWeight: 900, letterSpacing: "-0.04em", lineHeight: 1,
          color: palette.accent, fontFamily: ALT_FF, textTransform: "uppercase",
          textShadow: `0 0 24px color-mix(in oklab, ${palette.accent} 30%, transparent)`,
        }}>Today</span>
        <span style={{
          fontSize: 12, fontWeight: 700, letterSpacing: "0.02em",
          color: "rgba(220,228,240,0.55)", fontFamily: ALT_FF, lineHeight: 1,
        }}>{dayName}</span>
        <span style={{
          fontSize: 11, fontWeight: 600, letterSpacing: "0.04em",
          color: "rgba(220,228,240,0.35)", fontFamily: ALT_FM, lineHeight: 1,
        }}>{dayNum} {monthName} '{yy}</span>
      </div>
      <AltItemGrid fired={fired} />
    </div>);

}

        position:"absolute",inset:0,zIndex:20,

        {cities.map((c,i) => {
          const active = c.id === activeCityId;
          return (
            <button key={c.id} onClick={()=>{onSelect&&onSelect(c);onClose();}} style={{
              width:"100%",border:"none",cursor:"pointer",
              display:"flex",alignItems:"center",gap:10,
              padding:"11px 14px",
              background:active?"rgba(255,255,255,0.06)":"transparent",

                boxShadow:active?`0 0 8px ${stateCol(c.state)}`:"none"}}/>
              <div style={{flex:1,minWidth:0}}>

        </div>

}

  const [cityPickerOpen, setCityPickerOpen] = React.useState(false);
  const [selectedDay, setSelectedDay] = React.useState(() => {
    if (presetDayIndex == null) return null;
    const days = window.WEEKLY_FORECAST && window.WEEKLY_FORECAST[scenario] ?
    window.WEEKLY_FORECAST[scenario].slice(1) : [];
    const d = days[presetDayIndex];
    if (!d) return null;
    return { ...d, dateLabel: dateLabelOffset(presetDayIndex + 1), offset: presetDayIndex + 1 };
  });
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  if (!data) return null;

        position: "relative",
        height: 280,

        overflow: "hidden",

          position: "absolute", top: 64, left: 14, zIndex: 2,

          <Icon.Gear size={16} color="currentColor" />

          fontFamily: ALT_FF, fontSize: 11, fontWeight: 600,

          maxWidth: 220, cursor: "pointer",
        }}>
          <svg viewBox="0 0 24 24" width="11" height="11" fill="#f0f3f8" style={{ flexShrink: 0 }}>

      }
    </div>);

}

// ═══ Weather Toy — cute interactive mini-game at bottom of dashboard ═════
// Rainy: tap to open/close a tiny umbrella that catches raindrops, score counter.
// Sunny: tap clouds to reveal sunshine, clouds drift back.
// Neutral: swipe falling leaves left/right.
function WeatherToy({ scenario, accent }) {
  const canvasRef = React.useRef(null);
  const stateRef = React.useRef({ drops: [], score: 0, umbrellaOpen: false, frame: 0, clouds: [], leaves: [] });
  const [score, setScore] = React.useState(0);
  const [open, setOpen] = React.useState(false);

  const isRainy = scenario === "rainy";
  const isSunny = scenario === "sunny";

  React.useEffect(() => {
    const c = canvasRef.current;
    if (!c) return;
    const ctx = c.getContext("2d");
    const W = 358, H = 120;
    c.width = W * 2; c.height = H * 2;
    ctx.scale(2, 2);
    const st = stateRef.current;
    st.score = 0; st.drops = []; st.clouds = []; st.leaves = [];

    // Init clouds for sunny
    if (isSunny) {
      for (let i = 0; i < 4; i++) {
        st.clouds.push({ x: 40 + i * 80, y: 20 + (i % 2) * 25, w: 60 + i * 10, alive: true });
      }
    }
    // Init leaves for neutral
    if (!isRainy && !isSunny) {
      for (let i = 0; i < 8; i++) {
        st.leaves.push({ x: Math.random() * W, y: Math.random() * H, vx: 0.3 + Math.random() * 0.5, vy: 0.3 + Math.random() * 0.4, r: Math.random() * 360 });
      }
    }

    let raf;
    const loop = () => {
      st.frame++;
      ctx.clearRect(0, 0, W, H);

      if (isRainy) {
        // Spawn drops
        if (st.frame % 4 === 0) st.drops.push({ x: Math.random() * W, y: -4, speed: 1.5 + Math.random() * 1.5 });
        // Umbrella position
        const ux = W / 2, uy = H - 30;
        // Draw rain
        st.drops = st.drops.filter(d => {
          d.y += d.speed;
          ctx.strokeStyle = "rgba(122,174,252,0.6)";
          ctx.lineWidth = 1.2;
          ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x - 1, d.y + 5); ctx.stroke();
          // Check catch
          if (st.umbrellaOpen && d.y >= uy - 16 && d.y <= uy && Math.abs(d.x - ux) < 24) {
            st.score++;
            setScore(st.score);
            return false;
          }
          return d.y < H + 10;
        });
        // Draw umbrella
        ctx.save();
        ctx.translate(ux, uy);
        if (st.umbrellaOpen) {
          // Open umbrella
          ctx.fillStyle = accent || "#378ADC";
          ctx.beginPath(); ctx.arc(0, -14, 22, Math.PI, 0); ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.8)";
          ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(0, -14); ctx.lineTo(0, 14); ctx.stroke();
          ctx.beginPath(); ctx.arc(4, 14, 4, 0, Math.PI); ctx.stroke();
        } else {
          // Closed umbrella
          ctx.strokeStyle = "rgba(220,228,240,0.4)";
          ctx.lineWidth = 2;
          ctx.beginPath(); ctx.moveTo(0, -18); ctx.lineTo(0, 16); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(-3, -18); ctx.lineTo(0, -22); ctx.lineTo(3, -18); ctx.stroke();
        }
        ctx.restore();
        // Ground puddle
        ctx.fillStyle = "rgba(122,174,252,0.12)";
        ctx.beginPath(); ctx.ellipse(W / 2, H - 6, 60, 4, 0, 0, Math.PI * 2); ctx.fill();
      }

      if (isSunny) {
        // Sun in center (always there, revealed as clouds go)
        const alive = st.clouds.filter(c => c.alive).length;
        const sunOpacity = 1 - alive * 0.2;
        ctx.save();
        ctx.globalAlpha = Math.max(0.15, sunOpacity);
        ctx.fillStyle = "#F3A83A";
        ctx.beginPath(); ctx.arc(W / 2, H / 2, 20, 0, Math.PI * 2); ctx.fill();
        // Rays
        for (let i = 0; i < 8; i++) {
          const ang = (i / 8) * Math.PI * 2 + st.frame * 0.008;
          ctx.strokeStyle = `rgba(243,168,58,${0.3 * sunOpacity})`;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(W / 2 + Math.cos(ang) * 24, H / 2 + Math.sin(ang) * 24);
          ctx.lineTo(W / 2 + Math.cos(ang) * 36, H / 2 + Math.sin(ang) * 36);
          ctx.stroke();
        }
        ctx.restore();
        // Draw clouds
        st.clouds.forEach(cl => {
          if (!cl.alive) return;
          ctx.fillStyle = "rgba(180,195,215,0.7)";
          ctx.beginPath();
          ctx.ellipse(cl.x, cl.y, cl.w / 2, 14, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.ellipse(cl.x - cl.w * 0.25, cl.y + 4, cl.w * 0.3, 10, 0, 0, Math.PI * 2);
          ctx.fill();
        });
        if (alive === 0) {
          ctx.fillStyle = "rgba(243,168,58,0.08)";
          ctx.beginPath(); ctx.ellipse(W / 2, H - 8, 50, 4, 0, 0, Math.PI * 2); ctx.fill();
        }
      }

      if (!isRainy && !isSunny) {
        // Leaves drifting
        st.leaves.forEach(l => {
          l.x += l.vx; l.y += l.vy; l.r += 1.5;
          if (l.x > W + 10) l.x = -10;
          if (l.y > H + 10) { l.y = -10; l.x = Math.random() * W; }
          ctx.save();
          ctx.translate(l.x, l.y);
          ctx.rotate(l.r * Math.PI / 180);
          ctx.fillStyle = "rgba(200,170,90,0.6)";
          ctx.beginPath();
          ctx.moveTo(0, -5); ctx.quadraticCurveTo(5, -2, 5, 3);
          ctx.quadraticCurveTo(0, 5, -5, 3);
          ctx.quadraticCurveTo(-5, -2, 0, -5);
          ctx.fill();
          ctx.restore();
        });
        // Ground hint
        ctx.fillStyle = "rgba(200,170,90,0.08)";
        ctx.beginPath(); ctx.ellipse(W / 2, H - 6, 60, 3, 0, 0, Math.PI * 2); ctx.fill();
      }

      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, [scenario, accent]);

  const handleTap = (e) => {
    const c = canvasRef.current;
    if (!c) return;
    const rect = c.getBoundingClientRect();
    const x = (e.clientX || e.touches?.[0]?.clientX || 0) - rect.left;
    const y = (e.clientY || e.touches?.[0]?.clientY || 0) - rect.top;
    const scaleX = 358 / rect.width;
    const sx = x * scaleX, sy = y * (120 / rect.height);

    if (isRainy) {
      stateRef.current.umbrellaOpen = !stateRef.current.umbrellaOpen;
      setOpen(o => !o);
    }
    if (isSunny) {
      const st = stateRef.current;
      for (const cl of st.clouds) {
        if (!cl.alive) continue;
        if (Math.abs(sx - cl.x) < cl.w / 2 + 10 && Math.abs(sy - cl.y) < 20) {
          cl.alive = false;
          st.score++;
          setScore(st.score);
          break;
        }
      }
    }
  };

  const hint = isRainy
    ? (open ? "Catching drops!" : "Tap to open umbrella ☂")
    : isSunny
    ? "Tap clouds to find the sun"
    : "Watch the leaves drift";

  return (
    <div style={{
      margin: "10px 14px 24px", padding: "12px 14px 10px",
      borderRadius: 18,
      background: "color-mix(in oklab, var(--alt-surface, #1c2030) 25%, rgba(15,17,24,0.55))",
      border: "0.5px solid rgba(255,255,255,0.05)",
    }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
        <span style={{ fontSize: 9, fontWeight: 700, fontFamily: ALT_FM, color: "rgba(220,228,240,0.4)", letterSpacing: "0.5px", textTransform: "uppercase" }}>
          {isRainy ? "Raindrop catcher" : isSunny ? "Cloud buster" : "Leaf watch"}
        </span>
        {(isRainy || isSunny) && score > 0 && (
          <span style={{ fontSize: 10, fontWeight: 700, fontFamily: ALT_FM, color: accent || "#378ADC" }}>
            {score} {isRainy ? "caught" : "cleared"}
          </span>
        )}
      </div>
      <canvas
        ref={canvasRef}
        onClick={handleTap}
        onTouchStart={handleTap}
        style={{
          width: "100%", height: 120, borderRadius: 12, cursor: "pointer",
          background: "rgba(10,12,18,0.6)",
        }}
      />
      <div style={{ textAlign: "center", marginTop: 6, fontSize: 10, fontWeight: 600, color: "rgba(220,228,240,0.35)", fontFamily: ALT_FF }}>
        {hint}
      </div>
    </div>
  );
}

window.AlternativeDashboard = AlternativeDashboard;

// ═══ CTDataWheel — radial data dial that lifts off the "See more" button ═══
// A full-screen liquid-glass overlay. Six petals arranged around an empty
// centre; each petal previews a data slice and, when tapped, scrolls the
// dashboard to the matching `[data-anchor]` section.
//
// Geometry: 390×844 phone canvas, wheel centred at (195, 380). Petals sit
// on a 110px-radius circle starting at top (-90°) and going clockwise.
//
// Accessibility: every petal is a 84×84 hit-target with visible label + value,
// keyboard-focusable, contrast bumped on the glass tokens.

function CTPetalIcon({ kind, size = 18 }) {
  const s = size, p = { width: s, height: s, viewBox: "0 0 24 24", fill: "none",
    stroke: "currentColor", strokeWidth: 1.7, strokeLinecap: "round", strokeLinejoin: "round" };
  if (kind === "clock") return (<svg {...p}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>);
  if (kind === "stats") return (<svg {...p}><path d="M4 19h16M7 16V9M12 16V5M17 16v-4"/></svg>);
  if (kind === "bag")   return (<svg {...p}><path d="M6 9h12l-1 11H7L6 9z"/><path d="M9 9V6a3 3 0 0 1 6 0v3"/></svg>);
  if (kind === "cal")   return (<svg {...p}><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M4 10h16M9 3v4M15 3v4"/></svg>);
  if (kind === "info")  return (<svg {...p}><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h0"/></svg>);
  if (kind === "wind")  return (<svg {...p}><path d="M3 9h11a3 3 0 1 0-3-3M3 15h15a3 3 0 1 1-3 3M3 12h8"/></svg>);
  if (kind === "sun")   return (<svg {...p}><circle cx="12" cy="12" r="3.6"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4L7 17M17 7l1.4-1.4"/></svg>);
  if (kind === "drop")  return (<svg {...p}><path d="M12 3.5c3.5 4.8 6 7.8 6 11a6 6 0 1 1-12 0c0-3.2 2.5-6.2 6-11z"/></svg>);
  if (kind === "thermo")return (<svg {...p}><path d="M14 14.8V5a2 2 0 1 0-4 0v9.8a4 4 0 1 0 4 0z"/><path d="M12 9v6"/></svg>);
  if (kind === "moon")  return (<svg {...p}><path d="M20 14.5A8 8 0 0 1 9.5 4a8 8 0 1 0 10.5 10.5z"/></svg>);
  if (kind === "eye")   return (<svg {...p}><path d="M2.5 12S6 5.5 12 5.5 21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12z"/><circle cx="12" cy="12" r="3"/></svg>);
  return null;
}

function CTDataWheel({ open, onClose, onPick, palette, data, fired, peakRainHour }) {
  const [mounted, setMounted] = React.useState(false);
  React.useEffect(() => {
    if (open) { const t = setTimeout(() => setMounted(true), 10); return () => clearTimeout(t); }
    setMounted(false);
  }, [open]);
  if (!open) return null;

  const firedCount = fired ? fired.size : 0;
  // 10 petals at every 36°. Two non-data slots (sunrise/visibility) use
  // friendly placeholders since SCENARIOS doesn't carry that data yet.
  const petals = [
    { id: "hourly",  ang: -90, icon: "clock",  lab: "By hour",  val: peakRainHour ? `peak ${peakRainHour.h}:00` : `${(data.hourly||[]).length}h` },
    { id: "uv",      ang: -54, icon: "sun",    lab: "UV",       val: `index ${data.uv ?? "—"}`, anchor: "numbers" },
    { id: "rain",    ang: -18, icon: "drop",   lab: "Rain",     val: `${data.rainPct ?? 0}%`, anchor: "hourly" },
    { id: "feels",   ang:  18, icon: "thermo", lab: "Feels",    val: `${data.feels ?? "—"}°`, anchor: "numbers" },
    { id: "wind",    ang:  54, icon: "wind",   lab: "Wind",     val: `${data.wind ?? "—"} km/h`, anchor: "numbers" },
    { id: "numbers", ang:  90, icon: "stats",  lab: "Numbers",  val: `${data.high ?? "—"}°/${data.low ?? "—"}°` },
    { id: "days",    ang: 126, icon: "cal",    lab: "5 days",   val: "forecast" },
    { id: "reasons", ang: 162, icon: "info",   lab: "Why glow", val: "logic" },
    { id: "sun",     ang: 198, icon: "moon",   lab: "Sun",      val: "06:42 / 19:48", anchor: "hourly" },
    { id: "view",    ang: 234, icon: "eye",    lab: "Visibility", val: "10 km", anchor: "numbers" },
  ];

  // Wheel geometry — centred on the temperature orb.
  // Orb shrinks to ~60% (240px → 144px, radius 72) when the wheel is open.
  // Petal ring tightened to 138px; 60px hit-targets so 10 fit on the ring.
  const CX = 195, CY = 314, R = 138, SIZE = 60;
  const ORB_R = 72;

  const dur = 380, stagger = 28;

  return (
    <div
      onClick={onClose}
      role="dialog" aria-modal="true" aria-label="Data wheel"
      style={{
        position: "absolute", inset: 0, zIndex: 40,
        background: mounted ? "rgba(8,10,16,0.62)" : "rgba(8,10,16,0)",
        backdropFilter: mounted ? "blur(20px) saturate(140%)" : "blur(0px)",
        WebkitBackdropFilter: mounted ? "blur(20px) saturate(140%)" : "blur(0px)",
        transition: "background 340ms cubic-bezier(.2,.7,.2,1), backdrop-filter 340ms cubic-bezier(.2,.7,.2,1), -webkit-backdrop-filter 340ms cubic-bezier(.2,.7,.2,1)",
        cursor: "pointer",
      }}>
      {/* faint accent glow behind the wheel */}
      <div aria-hidden="true" style={{
        position: "absolute", left: CX - 200, top: CY - 200,
        width: 400, height: 400, borderRadius: "50%",
        background: `radial-gradient(circle, color-mix(in oklab, ${palette.accent} 24%, transparent) 0%, transparent 62%)`,
        opacity: mounted ? 1 : 0,
        transition: "opacity 380ms ease",
        pointerEvents: "none",
      }}></div>

      {/* SVG ring + connector ticks linking orb to petals */}
      <svg aria-hidden="true" width="390" height="844"
        viewBox="0 0 390 844"
        style={{
          position: "absolute", inset: 0,
          opacity: mounted ? 1 : 0,
          transition: `opacity ${dur}ms ease`,
          pointerEvents: "none",
        }}>
        {/* dashed ring on which the petals sit */}
        <circle cx={CX} cy={CY} r={R}
          fill="none"
          stroke={`color-mix(in oklab, ${palette.accent} 30%, rgba(255,255,255,0.18))`}
          strokeWidth="0.75"
          strokeDasharray="2 5"
        />
        {/* connector ticks from orb edge to each petal */}
        {petals.map((p, i) => {
          const rad = (p.ang * Math.PI) / 180;
          const x1 = CX + (ORB_R + 2) * Math.cos(rad);
          const y1 = CY + (ORB_R + 2) * Math.sin(rad);
          const x2 = CX + (R - SIZE / 2 - 2) * Math.cos(rad);
          const y2 = CY + (R - SIZE / 2 - 2) * Math.sin(rad);
          return (
            <line key={i} x1={x1} y1={y1} x2={x2} y2={y2}
              stroke={`color-mix(in oklab, ${palette.accent} 38%, rgba(255,255,255,0.22))`}
              strokeWidth="0.75" strokeLinecap="round"
              style={{
                opacity: mounted ? 1 : 0,
                transition: `opacity ${dur}ms ease ${(i * stagger) + 80}ms`,
              }}
            />
          );
        })}
      </svg>

      {/* petals */}
      {petals.map((p, i) => {
        const rad = (p.ang * Math.PI) / 180;
        const tx = R * Math.cos(rad);
        const ty = R * Math.sin(rad);
        return (
          <button
            key={`${p.id}-${i}`}
            onClick={(e) => { e.stopPropagation(); onPick(p.anchor || p.id); }}
            aria-label={`Jump to ${p.lab}: ${p.val}`}
            style={{
              position: "absolute",
              left: CX - SIZE / 2, top: CY - SIZE / 2,
              width: SIZE, height: SIZE, borderRadius: "50%",
              background: "rgba(18,20,28,0.7)",
              backdropFilter: "blur(28px) saturate(180%)",
              WebkitBackdropFilter: "blur(28px) saturate(180%)",
              border: `0.5px solid color-mix(in oklab, ${palette.accent} 22%, rgba(255,255,255,0.24))`,
              boxShadow: `inset 0 1px 0 rgba(255,255,255,0.32), inset 0 -1px 0 rgba(0,0,0,0.2), 0 10px 24px -6px rgba(0,0,0,0.55), 0 0 24px -8px color-mix(in oklab, ${palette.accent} 50%, transparent)`,
              color: "#F7FAFF",
              cursor: "pointer",
              display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
              gap: 1, padding: "4px 3px",
              opacity: mounted ? 1 : 0,
              transform: mounted ? `translate(${tx}px, ${ty}px) scale(1)` : `translate(0px, 0px) scale(0.2)`,
              transition: `opacity ${dur}ms cubic-bezier(.15,.8,.2,1) ${i * stagger}ms, transform ${dur}ms cubic-bezier(.15,.8,.2,1) ${i * stagger}ms, background 160ms ease, border-color 160ms ease`,
              fontFamily: ALT_FF,
            }}
            onMouseEnter={(e) => {
              e.currentTarget.style.background = `color-mix(in oklab, ${palette.accent} 26%, rgba(18,20,28,0.72))`;
              e.currentTarget.style.borderColor = `color-mix(in oklab, ${palette.accent} 50%, rgba(255,255,255,0.26))`;
            }}
            onMouseLeave={(e) => {
              e.currentTarget.style.background = "rgba(18,20,28,0.7)";
              e.currentTarget.style.borderColor = `color-mix(in oklab, ${palette.accent} 22%, rgba(255,255,255,0.24))`;
            }}>
            <div style={{ color: palette.accent, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <CTPetalIcon kind={p.icon} size={15} />
            </div>
            <div style={{ fontSize: 8.5, fontWeight: 700, color: "#F7FAFF", letterSpacing: "-0.05px", textAlign: "center", lineHeight: 1 }}>
              {p.lab}
            </div>
            <div style={{ fontSize: 7, fontWeight: 600, color: "rgba(220,228,240,0.68)", fontFamily: ALT_FM, letterSpacing: "0.1px", textAlign: "center", lineHeight: 1, whiteSpace: "nowrap", maxWidth: SIZE - 6, overflow: "hidden", textOverflow: "ellipsis" }}>
              {p.val}
            </div>
          </button>
        );
      })}

      {/* What to bring — moved INSIDE the wheel overlay so it sits below
          the wheel when the user holds the orb. The page-level carousel
          stays for the un-pressed state. */}
      <div aria-hidden={!mounted} style={{
        position: "absolute", left: 0, right: 0, bottom: 30,
        opacity: mounted ? 1 : 0,
        transform: mounted ? "translateY(0)" : "translateY(8px)",
        transition: `opacity ${dur}ms ease ${petals.length * stagger}ms, transform ${dur}ms cubic-bezier(.2,.7,.2,1) ${petals.length * stagger}ms`,
        pointerEvents: mounted ? "auto" : "none",
      }} onClick={(e) => e.stopPropagation()}>
        <div style={{
          fontSize: 9.5, fontWeight: 700, letterSpacing: "0.5px",
          color: "rgba(220,228,240,0.55)",
          textTransform: "uppercase", fontFamily: ALT_FM,
          padding: "0 18px", marginBottom: 10, textAlign: "center",
        }}>What to bring</div>
        <div style={{
          display: "flex", gap: 8, justifyContent: "flex-start",
          overflowX: "auto", overflowY: "hidden",
          padding: "2px 18px 6px",
          scrollSnapType: "x mandatory",
          scrollbarWidth: "none",
          WebkitOverflowScrolling: "touch",
        }}>
          {ALT_ITEMS.map((it) => {
            const on = fired ? fired.has(it.id) : false;
            return (
              <div key={it.id} style={{
                flexShrink: 0,
                width: 56, height: 64,
                scrollSnapAlign: "start",
                borderRadius: 16,
                background: on
                  ? `color-mix(in oklab, ${palette.accent} 22%, rgba(255,255,255,0.10))`
                  : "rgba(255,255,255,0.07)",
                border: on
                  ? `0.5px solid color-mix(in oklab, ${palette.accent} 40%, rgba(255,255,255,0.20))`
                  : "0.5px solid rgba(255,255,255,0.14)",
                boxShadow: on
                  ? `inset 0 1px 0 rgba(255,255,255,0.30), 0 4px 16px -4px color-mix(in oklab, ${palette.accent} 30%, transparent)`
                  : "inset 0 1px 0 rgba(255,255,255,0.22)",
                display: "flex", flexDirection: "column",
                alignItems: "center", justifyContent: "center", gap: 5,
                position: "relative", overflow: "hidden",
              }}>
                {on && (
                  <div style={{
                    position: "absolute", top: 5, right: 5,
                    width: 5, height: 5, borderRadius: "50%",
                    background: palette.accent,
                    boxShadow: `0 0 6px ${palette.accent}`,
                  }}></div>
                )}
                <div style={{
                  color: on ? palette.accent : "rgba(220,228,240,0.55)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                }}>
                  <AGlyph kind={it.id} size={18} />
                </div>
                <div style={{
                  fontSize: 8.5, fontWeight: on ? 700 : 600,
                  color: on ? "rgba(247,250,255,0.92)" : "rgba(220,228,240,0.62)",
                  letterSpacing: "0.1px", textAlign: "center",
                  lineHeight: 1.15, padding: "0 3px",
                }}>{it.label}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* footer hint pill */}
      <div aria-hidden="true" style={{
        position: "absolute", bottom: 6, left: 0, right: 0,
        display: "flex", justifyContent: "center",
        opacity: mounted ? 1 : 0,
        transition: `opacity ${dur}ms ease ${petals.length * stagger + 60}ms`,
        pointerEvents: "none",
      }}>
        <div style={{
          padding: "5px 12px", borderRadius: 9999,
          background: "rgba(14,16,22,0.55)",
          border: "0.5px solid rgba(255,255,255,0.14)",
          fontFamily: ALT_FM, fontSize: 9, fontWeight: 600,
          color: "rgba(220,228,240,0.6)", letterSpacing: "0.3px",
          textTransform: "uppercase",
        }}>
          tap a slice · release to close
        </div>
      </div>
    </div>
  );
}

window.CTDataWheel = CTDataWheel;

// ═══ CenteredTempDashboard — alternative layout: scene top, temp dead-center ═══
// Layout overview (390×844):
//   · Full-bleed scene illustration at top (~190px) — umbrella visible, rounded bottom
//   · Giant temperature number centered horizontally (~128px) — the focal point
//   · Condition label above temp, feels-like below
//   · Full-width 2×4 item grid with "What to bring" label
//   · Next-days list at bottom (tappable → DaySheet)
//   · Settings + city-picker overlays identical to AlternativeDashboard

// ═════════════════════════════════════════════════════════════════════════
// CTRestOfDay — three premium alternatives for the "Rest of the day" zone.
// Lives between the orb and the Next-days list. Variant toggleable via the
// small segmented pill in the section header.
//
//   variant "events"  — Coming Up horizontal event slider
//   variant "console" — Compact dashboard with metrics + daylight arc
//   variant "hybrid"  — Top: timeline of events · bottom: metric chips
//
// Glass dialect matches the rest of CenteredTempDashboard: translucent
// capsules, hairline borders, soft top-sheen, palette-accent highlights.
// ═════════════════════════════════════════════════════════════════════════
function CTRestOfDay({ data, palette, variant, onVariantChange }) {
  const hrs = React.useMemo(() => (data.hourly || []).slice(0, 8), [data]);
  if (!hrs.length) return null;

  // Derive numbers the scenario does not carry explicitly.
  const humidity = data.state === "rainy" ? 78 : data.state === "sunny" ? 38 : 56;
  const visibility = data.state === "rainy" ? 6 : 10;
  const sunrise = "06:42", sunset = "19:48";
  // "Now" — pretend it's the start of the hourly slice.
  const now = hrs[0];
  const tomMin = Math.min(...hrs.map((h) => h.t));
  const tomMax = Math.max(...hrs.map((h) => h.t));

  // Find narrative events to surface.
  const events = (() => {
    const out = [{ kind: "now", h: now.h, label: "Now", t: data.temp,
                   sub: data.state === "rainy" ? "Light rain" : data.state === "sunny" ? "Clear" : "Cloudy" }];
    const rainStart = hrs.find((h) => (h.p ?? 0) >= 40);
    const peak = hrs.reduce((a, b) => (b.p ?? 0) > (a.p ?? 0) ? b : a, hrs[0]);
    const windRise = hrs.reduce((a, b) => (b.wind ?? 0) > (a.wind ?? 0) ? b : a, hrs[0]);
    if (rainStart && rainStart !== now && (rainStart.p ?? 0) >= 40) {
      out.push({ kind: "rainStart", h: rainStart.h, label: "Rain starts", t: rainStart.t, sub: `${rainStart.p}%` });
    }
    if (peak && (peak.p ?? 0) >= 40) {
      out.push({ kind: "peakRain", h: peak.h, label: "Peak rain", t: peak.t, sub: `${peak.p}%` });
    }
    if (windRise && (windRise.wind ?? 0) >= 20) {
      out.push({ kind: "wind", h: windRise.h, label: "Wind rises", t: windRise.t, sub: `${windRise.wind} km/h` });
    }
    out.push({ kind: "sunset", h: sunset.slice(0,2), label: "Sunset", t: null, sub: sunset });
    // Dedupe consecutive identical hours.
    return out.filter((e, i, a) => i === 0 || e.h !== a[i-1].h).slice(0, 6);
  })();

  // One-line "next change" message.
  const nextChange = (() => {
    const e = events.find((x) => x.kind !== "now");
    if (!e) return "Quiet through the evening.";
    if (e.kind === "rainStart") return `Rain starts around ${e.h}:00.`;
    if (e.kind === "peakRain")  return `Peak rain near ${e.h}:00 (${e.sub}).`;
    if (e.kind === "wind")      return `Wind rises to ${e.sub} by ${e.h}:00.`;
    if (e.kind === "sunset")    return `Daylight until ${e.sub}.`;
    return "";
  })();

  // Shared section chrome.
  const variants = [
    { id: "events",  lab: "Events"  },
    { id: "console", lab: "Console" },
    { id: "hybrid",  lab: "Hybrid"  },
  ];

  const cardBase = {
    margin: "0 18px",
    borderRadius: 22,
    background: "rgba(255,255,255,0.05)",
    border: "0.5px solid rgba(255,255,255,0.13)",
    boxShadow: "inset 0 1px 0 rgba(255,255,255,0.18), 0 10px 28px -10px rgba(0,0,0,0.42)",
    position: "relative", overflow: "hidden",
  };
  const topSheen = (
    <div aria-hidden="true" style={{
      position: "absolute", top: 0, left: "8%", right: "8%", height: "30%",
      background: "linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 100%)",
      borderRadius: "0 0 50% 50%", pointerEvents: "none",
    }}></div>
  );

  // Icon glyph helper for events.
  const EventIcon = ({ kind, size = 14 }) => {
    const p = { width: size, height: size, viewBox: "0 0 24 24", fill: "none",
                stroke: "currentColor", strokeWidth: 1.8, strokeLinecap: "round", strokeLinejoin: "round" };
    if (kind === "now") return (<svg {...p}><circle cx="12" cy="12" r="3.4" fill="currentColor"/><circle cx="12" cy="12" r="8" opacity="0.45"/></svg>);
    if (kind === "rainStart" || kind === "peakRain") return (<svg {...p}><path d="M12 3.5c3.5 4.8 6 7.8 6 11a6 6 0 1 1-12 0c0-3.2 2.5-6.2 6-11z" fill="currentColor"/></svg>);
    if (kind === "wind") return (<svg {...p}><path d="M3 9h11a3 3 0 1 0-3-3M3 15h15a3 3 0 1 1-3 3M3 12h8"/></svg>);
    if (kind === "sunset") return (<svg {...p}><path d="M5 17h14M12 13V4M8 8l4-4 4 4M3 21h18"/></svg>);
    return null;
  };

  // Tiny metric chip used in console/hybrid variants.
  const MetricChip = ({ icon, lab, val, unit }) => (
    <div style={{
      flex: "1 1 0", minWidth: 0,
      display: "flex", flexDirection: "column", gap: 3,
      padding: "8px 10px",
      borderRadius: 14,
      background: "rgba(255,255,255,0.04)",
      border: "0.5px solid rgba(255,255,255,0.10)",
      boxShadow: "inset 0 1px 0 rgba(255,255,255,0.14)",
      position: "relative", overflow: "hidden",
    }}>
      <div style={{
        display: "flex", alignItems: "center", gap: 4,
        color: "rgba(220,228,240,0.5)",
      }}>
        {icon}
        <div style={{
          fontSize: 8.5, fontWeight: 700, letterSpacing: "0.4px",
          textTransform: "uppercase", fontFamily: ALT_FM,
        }}>{lab}</div>
      </div>
      <div style={{
        fontSize: 16, fontWeight: 700, color: "#F7FAFF",
        letterSpacing: "-0.4px", lineHeight: 1,
        fontVariantNumeric: "tabular-nums",
      }}>
        {val}<span style={{ fontSize: 10, fontWeight: 600, color: "rgba(220,228,240,0.55)", marginLeft: 1.5 }}>{unit}</span>
      </div>
    </div>
  );

  const mIcon = (svg) => (
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{svg}</svg>
  );
  const ic = {
    feels:  mIcon(<path d="M14 14.8V5a2 2 0 1 0-4 0v9.8a4 4 0 1 0 4 0z"/>),
    wind:   mIcon(<path d="M3 9h11a3 3 0 1 0-3-3M3 15h15a3 3 0 1 1-3 3M3 12h8"/>),
    hum:    mIcon(<path d="M12 3.5c3.5 4.8 6 7.8 6 11a6 6 0 1 1-12 0c0-3.2 2.5-6.2 6-11z"/>),
    uv:     mIcon(<><circle cx="12" cy="12" r="3.6"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2"/></>),
    vis:    mIcon(<><path d="M2.5 12S6 5.5 12 5.5 21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12z"/><circle cx="12" cy="12" r="3"/></>),
    range:  mIcon(<path d="M4 12h16M7 8l-3 4 3 4M17 8l3 4-3 4"/>),
  };

  // Section header — shared, with inline variant pill.
  const Header = (
    <div style={{
      display: "flex", alignItems: "center", justifyContent: "space-between",
      padding: "0 18px", marginBottom: 12,
    }}>
      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
        <div style={{
          fontSize: 9.5, fontWeight: 700, letterSpacing: "0.5px",
          color: "rgba(220,228,240,0.5)",
          textTransform: "uppercase", fontFamily: ALT_FM,
        }}>Rest of the day</div>
        <div style={{
          fontSize: 10.5, fontWeight: 600,
          color: "rgba(220,228,240,0.42)",
          fontFamily: ALT_FM, letterSpacing: "0.1px",
          fontVariantNumeric: "tabular-nums",
        }}>{tomMin}° – {tomMax}° · {nextChange}</div>
      </div>
      <div style={{
        display: "flex", padding: 2, borderRadius: 9999,
        background: "rgba(255,255,255,0.06)",
        border: "0.5px solid rgba(255,255,255,0.13)",
        boxShadow: "inset 0 1px 0 rgba(255,255,255,0.16)",
      }}>
        {variants.map((v) => {
          const on = variant === v.id;
          return (
            <button key={v.id}
              onClick={() => onVariantChange(v.id)}
              style={{
                appearance: "none", border: "none", cursor: "pointer",
                padding: "4px 9px", borderRadius: 9999,
                background: on
                  ? `color-mix(in oklab, ${palette.accent} 22%, rgba(255,255,255,0.10))`
                  : "transparent",
                color: on ? "#F7FAFF" : "rgba(220,228,240,0.55)",
                fontSize: 9, fontWeight: 700, fontFamily: ALT_FM,
                letterSpacing: "0.3px", textTransform: "uppercase",
                transition: "all 160ms ease",
              }}>{v.lab}</button>
          );
        })}
      </div>
    </div>
  );

  // ─── Alt 1 — Coming Up event slider ────────────────────────────────────
  if (variant === "events") {
    return (
      <div data-anchor="hourly" style={{ paddingTop: 22, paddingBottom: 4 }}>
        {Header}
        <div style={{
          display: "flex", gap: 8,
          overflowX: "auto", overflowY: "hidden",
          padding: "2px 18px 8px",
          scrollSnapType: "x mandatory",
          scrollbarWidth: "none",
          WebkitOverflowScrolling: "touch",
        }}>
          {events.map((e, i) => {
            const featured = e.kind === "now";
            return (
              <div key={i} style={{
                flexShrink: 0, scrollSnapAlign: "start",
                width: featured ? 124 : 108, height: 132,
                borderRadius: 18,
                background: featured
                  ? `color-mix(in oklab, ${palette.accent} 18%, rgba(255,255,255,0.07))`
                  : "rgba(255,255,255,0.05)",
                border: featured
                  ? `0.5px solid color-mix(in oklab, ${palette.accent} 38%, rgba(255,255,255,0.18))`
                  : "0.5px solid rgba(255,255,255,0.13)",
                boxShadow: featured
                  ? `inset 0 1px 0 rgba(255,255,255,0.22), 0 8px 22px -8px color-mix(in oklab, ${palette.accent} 35%, transparent)`
                  : "inset 0 1px 0 rgba(255,255,255,0.18), 0 6px 16px -8px rgba(0,0,0,0.35)",
                padding: "12px 12px 11px",
                display: "flex", flexDirection: "column",
                justifyContent: "space-between",
                position: "relative", overflow: "hidden",
              }}>
                <div aria-hidden="true" style={{
                  position: "absolute", top: 0, left: "10%", right: "10%", height: "30%",
                  background: "linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 100%)",
                  borderRadius: "0 0 50% 50%", pointerEvents: "none",
                }}></div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <div style={{
                    fontSize: 10.5, fontWeight: 700,
                    color: featured ? "#F7FAFF" : "rgba(220,228,240,0.78)",
                    fontFamily: ALT_FM, letterSpacing: "0.2px",
                    fontVariantNumeric: "tabular-nums",
                  }}>{featured ? "Now" : `${e.h}:00`}</div>
                  <div style={{ color: featured ? palette.accent : "rgba(220,228,240,0.55)" }}>
                    <EventIcon kind={e.kind} size={14}/>
                  </div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                  <div style={{
                    fontSize: 12.5, fontWeight: 700, color: "#F7FAFF",
                    letterSpacing: "-0.2px", lineHeight: 1.1,
                  }}>{e.label}</div>
                  <div style={{
                    fontSize: 10, fontWeight: 600,
                    color: featured ? "rgba(247,250,255,0.78)" : "rgba(220,228,240,0.5)",
                    fontFamily: ALT_FM, letterSpacing: "0.2px",
                    fontVariantNumeric: "tabular-nums",
                  }}>
                    {e.t != null && <span style={{ marginRight: 6, color: "#F7FAFF", fontSize: 13, fontWeight: 700 }}>{e.t}°</span>}
                    {e.sub}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ─── Alt 2 — Compact console with daylight arc ─────────────────────────
  if (variant === "console") {
    // Daylight progress: 06:42 → 19:48, fake "now" at hrs[0].h
    const nowH = parseInt(now.h, 10) + (now.h === "00" ? 24 : 0);
    const dayStart = 6 + 42/60, dayEnd = 19 + 48/60;
    const prog = Math.max(0, Math.min(1, (nowH - dayStart) / (dayEnd - dayStart)));

    return (
      <div data-anchor="hourly" style={{ paddingTop: 22, paddingBottom: 4 }}>
        {Header}
        <div style={{ ...cardBase, padding: "14px 14px 13px" }}>
          {topSheen}

          {/* Daylight arc */}
          <div style={{ position: "relative", height: 46, marginBottom: 12 }}>
            <svg viewBox="0 0 340 46" width="100%" height="46" preserveAspectRatio="none"
                 style={{ display: "block" }}>
              <defs>
                <linearGradient id={`arc-${data.state}`} x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%"   stopColor="rgba(255,255,255,0.25)"/>
                  <stop offset={`${prog*100}%`} stopColor={palette.accent} stopOpacity="0.9"/>
                  <stop offset={`${prog*100}%`} stopColor="rgba(255,255,255,0.18)" stopOpacity="0.5"/>
                  <stop offset="100%" stopColor="rgba(255,255,255,0.15)"/>
                </linearGradient>
              </defs>
              <path d="M10 38 Q170 -8 330 38" fill="none"
                    stroke="rgba(255,255,255,0.14)" strokeWidth="1.5" strokeDasharray="2 3"/>
              <path d="M10 38 Q170 -8 330 38" fill="none"
                    stroke={`url(#arc-${data.state})`} strokeWidth="2.4" strokeLinecap="round"/>
              {/* Sun dot at progress */}
              {(() => {
                // Parametric quadratic Bezier point.
                const t = prog;
                const x = (1-t)*(1-t)*10 + 2*(1-t)*t*170 + t*t*330;
                const y = (1-t)*(1-t)*38 + 2*(1-t)*t*(-8) + t*t*38;
                return (<>
                  <circle cx={x} cy={y} r="9" fill={palette.accent} opacity="0.18"/>
                  <circle cx={x} cy={y} r="4.2" fill="#F7FAFF"/>
                  <circle cx={x} cy={y} r="4.2" fill={palette.accent} opacity="0.55"/>
                </>);
              })()}
            </svg>
            <div style={{
              position: "absolute", left: 0, right: 0, top: 32,
              display: "flex", justifyContent: "space-between",
              padding: "0 4px",
              fontSize: 9, fontWeight: 600, fontFamily: ALT_FM,
              color: "rgba(220,228,240,0.5)", letterSpacing: "0.3px",
              fontVariantNumeric: "tabular-nums",
            }}>
              <span>{sunrise}</span>
              <span style={{ color: "rgba(220,228,240,0.32)" }}>daylight</span>
              <span>{sunset}</span>
            </div>
          </div>

          {/* Metric chips */}
          <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
            <MetricChip icon={ic.feels} lab="Feels" val={data.feels ?? "—"} unit="°"/>
            <MetricChip icon={ic.wind}  lab="Wind"  val={data.wind ?? "—"}  unit=" km/h"/>
            <MetricChip icon={ic.hum}   lab="Humid" val={humidity}          unit="%"/>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <MetricChip icon={ic.uv}    lab="UV"    val={data.uv ?? "—"}    unit=""/>
            <MetricChip icon={ic.vis}   lab="View"  val={visibility}        unit=" km"/>
            <MetricChip icon={ic.range} lab="Range" val={`${tomMin}–${tomMax}`} unit="°"/>
          </div>
        </div>
      </div>
    );
  }

  // ─── Hybrid (final): "Today Ahead" — Key Moments + hourly strip ────────
  // Layout:
  //   · header (TODAY AHEAD + range + next-change message)
  //   · Key Moments — small chip row of scenario-specific highlights
  //   · Hourly strip — clean column layout (hour / icon / temp / precip),
  //     horizontal scroll, no chart curve, no metric grid below.
  //
  // Event labels are scenario-specific:
  //   rainy   → Rain Starts · Peak Rain · Wind Rises
  //   sunny   → UV Rises · Brightest Hour · Golden Hour · Cooler Evening
  //   hot     → SPF Now · UV Peak · Heat Risk · Sunset

  // Detect the scenario bucket
  const hotBeach = data.state === "sunny" && (data.temp ?? 0) >= 30;
  const bucket = data.state === "rainy" ? "rainy" : hotBeach ? "hot" : data.state === "sunny" ? "sunny" : "rainy";

  // Build a 12-hour forecast window for visual density.
  const fullHrs = (() => {
    const base = (data.hourly || []).slice();
    if (base.length >= 12) return base.slice(0, 12);
    if (!base.length) return [];
    while (base.length < 12) {
      const last = base[base.length - 1];
      const prev = base[base.length - 2] || last;
      const nextH = ((parseInt(last.h, 10) + 1) % 24).toString().padStart(2, "0");
      const tDrift = parseInt(last.h, 10) >= 18 ? -1 : 0;
      base.push({
        h: nextH,
        t: Math.max(tomMin - 2, last.t + tDrift),
        p: Math.max(0, (last.p ?? 0) - 8 + (prev.p ?? 0 ? 4 : 0)),
        wind: last.wind,
      });
    }
    return base;
  })();

  // Identify event-marked hours per scenario.
  const eventByHour = (() => {
    const m = {};
    if (bucket === "rainy") {
      const firstRain = fullHrs.find((h) => (h.p ?? 0) >= 40);
      if (firstRain) m[firstRain.h] = { kind: "rainStart", label: "Rain Starts" };
      const peakH = fullHrs.reduce((a, b) => (b.p ?? 0) > (a.p ?? 0) ? b : a, fullHrs[0]);
      if (peakH && (peakH.p ?? 0) >= 40 && peakH !== firstRain) {
        m[peakH.h] = { kind: "peakRain", label: "Peak Rain" };
      }
      const peakWind = fullHrs.reduce((a, b) => (b.wind ?? 0) > (a.wind ?? 0) ? b : a, fullHrs[0]);
      if (peakWind && (peakWind.wind ?? 0) >= 22 && !m[peakWind.h]) {
        m[peakWind.h] = { kind: "wind", label: "Wind Rises" };
      }
    } else if (bucket === "hot") {
      // SPF Now → first morning hour ≥10:00
      const spf = fullHrs.find((h) => parseInt(h.h, 10) >= 10) || fullHrs[1];
      if (spf) m[spf.h] = { kind: "spf", label: "SPF Now" };
      // UV Peak → hottest hour
      const tPeak = fullHrs.reduce((a, b) => b.t > a.t ? b : a, fullHrs[0]);
      if (tPeak && !m[tPeak.h]) m[tPeak.h] = { kind: "uvPeak", label: "UV Peak" };
      // Heat Risk → afternoon hour ≥14:00 with temp ≥ 33
      const heat = fullHrs.find((h) => parseInt(h.h, 10) >= 14 && h.t >= 33);
      if (heat && !m[heat.h]) m[heat.h] = { kind: "heat", label: "Heat Risk" };
      // Sunset
      const sH = sunset.slice(0, 2);
      if (fullHrs.find((h) => h.h === sH) && !m[sH]) m[sH] = { kind: "sunset", label: "Sunset" };
    } else { // sunny
      // UV Rises → morning hour ≥09:00
      const uvR = fullHrs.find((h) => parseInt(h.h, 10) >= 9) || fullHrs[1];
      if (uvR) m[uvR.h] = { kind: "uvRises", label: "UV Rises" };
      // Brightest → hottest mid-day
      const bright = fullHrs.reduce((a, b) => b.t > a.t ? b : a, fullHrs[0]);
      if (bright && !m[bright.h]) m[bright.h] = { kind: "brightest", label: "Brightest Hour" };
      // Golden Hour → ~17:00–18:00
      const golden = fullHrs.find((h) => parseInt(h.h, 10) === 18) || fullHrs.find((h) => parseInt(h.h, 10) === 17);
      if (golden && !m[golden.h]) m[golden.h] = { kind: "golden", label: "Golden Hour" };
      // Cooler Evening → first evening hour ≥19:00
      const cooler = fullHrs.find((h) => parseInt(h.h, 10) >= 19);
      if (cooler && !m[cooler.h]) m[cooler.h] = { kind: "cooler", label: "Cooler Evening" };
    }
    return m;
  })();

  // Scenario-aware nextChange override
  const nextChangeS = (() => {
    const firstEvtH = fullHrs.find((h) => eventByHour[h.h] && h !== fullHrs[0]);
    if (!firstEvtH) {
      if (bucket === "rainy") return "Quiet through the evening.";
      if (bucket === "hot")   return `Heat lingers — sunset ${sunset}.`;
      return `Clear skies — sunset ${sunset}.`;
    }
    const e = eventByHour[firstEvtH.h];
    return `${e.label} around ${firstEvtH.h}:00`;
  })();

  // Column width for the hourly strip
  const COL_W = 48;

  // Ordered list of key moments (in time order) — drives the chip row.
  const keyMoments = fullHrs
    .map((h) => ({ h: h.h, ev: eventByHour[h.h] }))
    .filter((x) => x.ev)
    .map((x) => ({ kind: x.ev.kind, label: x.ev.label, h: x.h }));

  // Hour weather glyph
  const HourGlyph = ({ h, size = 16 }) => {
    const p = (h.p ?? 0);
    const props = { width: size, height: size, viewBox: "0 0 24 24", fill: "none",
                    stroke: "currentColor", strokeWidth: 1.5, strokeLinecap: "round", strokeLinejoin: "round" };
    if (bucket === "sunny" || bucket === "hot") {
      if (parseInt(h.h, 10) >= 19 || parseInt(h.h, 10) <= 5) {
        return (<svg {...props}><path d="M20 14.5A8 8 0 0 1 9.5 4a8 8 0 1 0 10.5 10.5z"/></svg>);
      }
      return (<svg {...props}><circle cx="12" cy="12" r="3.6"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4L7 17M17 7l1.4-1.4"/></svg>);
    }
    if (p >= 60) return (<svg {...props}><path d="M5 14a4 4 0 1 1 1-7.9A5 5 0 0 1 17 6a4 4 0 0 1 2 7.5"/><path d="M9 17v3M12 16v4M15 17v3"/></svg>);
    if (p >= 30) return (<svg {...props}><path d="M5 14a4 4 0 1 1 1-7.9A5 5 0 0 1 17 6a4 4 0 0 1 2 7.5"/><path d="M11 17v2"/></svg>);
    return (<svg {...props}><path d="M5 16a4 4 0 1 1 1-7.9A5 5 0 0 1 17 8a4 4 0 0 1 2 7.5"/></svg>);
  };

  // Key Moment chip — small pill above the hourly strip.
  const KeyMomentChip = ({ kind, label, h }) => {

          </div>
        </div>

}

function uvLabel(uv) {
  if (uv == null) return null;
  if (uv <= 2) return "Low";
  if (uv <= 5) return "Moderate";
  if (uv <= 7) return "High";
  if (uv <= 10) return "Very high";
  return "Extreme";
}
window.CTRestOfDay = CTRestOfDay;

        palette={palette}

}

const BHM_FF  = "Georgia,'Times New Roman',serif";
const BHM_SAN = "-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif";
const BHM_BG  = "#12100A";

function BohemCenteredDashboard({ scenario = "rainy", forceHeroItem = null }) {

      background: BHM_BG,
      color: BHM_INK,
      fontFamily: BHM_SAN,

      "--alt-glow":    palette.glow,

          background: "linear-gradient(160deg, rgba(80,50,10,0.28) 0%, rgba(140,80,20,0.18) 50%, transparent 80%)",

        {/* Warm glass floor */}

        {/* Settings gear */}

          background: wg.dark,
          backdropFilter: wg.blur, WebkitBackdropFilter: wg.blur,
          boxShadow: wg.spec,
          color: BHM_INK, display: "flex", alignItems: "center", justifyContent: "center",
        }}>
          <Icon.Gear size={15} color="currentColor" />
        </button>

        {/* Location pill */}
        <div onClick={() => setCityPickerOpen(o => !o)} style={{
          position: "absolute", top: 56, right: 14, zIndex: 4,
          display: "inline-flex", alignItems: "center", gap: 5,
          padding: "6px 12px", borderRadius: 9999,
          background: wg.dark,
          backdropFilter: wg.blur, WebkitBackdropFilter: wg.blur,
          border: `0.5px solid ${wg.border}`,
          boxShadow: wg.spec,
          fontFamily: BHM_SAN, fontSize: 11, fontWeight: 500,
          color: BHM_INK, letterSpacing: "0.02em", cursor: "pointer",
        }}>
          <svg viewBox="0 0 24 24" width="10" height="10" fill={BHM_INK} style={{ flexShrink: 0 }}>
            <path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z" />
          </svg>

        {/* ── Temperature block ── */}

          position: "absolute", bottom: 22, left: 0, right: 0, zIndex: 3,
          display: "flex", flexDirection: "column", alignItems: "center", textAlign: "center",
        }}>

          <div style={{
            fontSize: 10.5, fontWeight: 400, letterSpacing: "0.22em",

          }}>{condLabel}</div>

          {/* Giant temp — thin serif italic */}
          <div style={{
            fontSize: 152, fontWeight: 300,
            lineHeight: 0.85, letterSpacing: "-6px",
            fontFamily: BHM_FF, fontStyle: "italic",
            color: BHM_INK,
            textShadow: "0 2px 48px rgba(0,0,0,0.55), 0 0 80px rgba(220,180,80,0.08)",

          {/* Feels like — plain warm text */}
          <div style={{
            marginTop: 14,
            fontSize: 12.5, fontWeight: 400,
            color: "rgba(245,220,150,0.65)",

          {/* See more — underline-only ghost */}

            marginTop: 12,
            display: "inline-flex", alignItems: "center", gap: 4,
            padding: "4px 0",
            border: "none", background: "transparent",
            borderBottom: `0.5px solid rgba(245,220,150,0.30)`,
            color: "rgba(245,220,150,0.55)",
            fontFamily: BHM_SAN, fontSize: 11, fontWeight: 400,
            cursor: "pointer", letterSpacing: "0.05em",
          }}>
            <span>{detailOpen ? "less" : "see more"}</span>
            <svg viewBox="0 0 24 24" width="10" height="10" fill="none"
              stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
